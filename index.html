<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Despachos</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f0;
      color: #1a1a1a;
      padding: 16px;
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header .titulo { flex: 1; text-align: center; }
    header h1 { font-size: 1.2rem; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
    header img { height: 46px; width: auto; flex-shrink: 0; }

    .card {
      background: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    label.campo {
      display: block;
      font-size: 0.85rem;
      font-weight: bold;
      color: #2e7d32;
      margin-bottom: 6px;
    }

    input[type="date"], input[type="text"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #c8e6c9;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 14px;
    }

    /* --- Card de seleccionadas (siempre visible) --- */
    .sel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .sel-header .titulo-sel { font-size: 0.9rem; font-weight: bold; color: #2e7d32; }
    .btn-limpiar {
      font-size: 0.75rem;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
    }
    #chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 0.82rem;
      font-weight: bold;
    }
    .chip .x { cursor: pointer; font-weight: bold; color: #c62828; }
    .chip-vacio { font-size: 0.85rem; color: #999; }

    .stock-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .btn-seleccionar {
      font-size: 0.78rem;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
    }

    #buscador { margin-bottom: 12px; }

    #filtro-pcr {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .btn-pcr {
      padding: 6px 14px;
      border: 1px solid #a5d6a7;
      border-radius: 20px;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .btn-pcr.activo { background: #2e7d32; color: white; border-color: #2e7d32; }

    .btn-escanear {
      display: block;
      width: 100%;
      padding: 12px;
      background: #1b5e20;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
      text-align: center;
    }

    #cam-select {
      width: 100%;
      padding: 10px;
      border: 1px solid #c8e6c9;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    #reader { display: none; width: 100%; margin-bottom: 12px; border-radius: 8px; overflow: hidden; }

    #scan-feedback {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(46, 125, 50, 0.92);
      color: white;
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      pointer-events: none;
    }

    #btn-cerrar-scanner {
      display: none;
      width: 100%;
      padding: 8px;
      background: #c62828;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-bottom: 12px;
    }

    #serie-escaneada { display: none; padding: 10px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 12px; text-align: center; }

    #contador { font-size: 0.85rem; color: #2e7d32; font-weight: bold; margin-bottom: 12px; }

    .serie-item {
      display: flex;
      align-items: center;
      padding: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .serie-item.escaneada { border-color: #2e7d32; background: #f1f8f1; }

    .serie-item input[type="checkbox"] {
      width: 20px; height: 20px; margin: 0 12px 0 0;
      accent-color: #2e7d32; flex-shrink: 0; pointer-events: none;
    }

    .serie-info { flex: 1; }
    .serie-codigo { font-weight: bold; font-size: 0.95rem; }
    .serie-desc   { font-size: 0.8rem; color: #666; margin-top: 2px; }

    .empty   { text-align: center; color: #999; font-size: 0.9rem; padding: 20px 0; }
    .loading { text-align: center; color: #999; padding: 20px 0; font-size: 0.9rem; }

    .btn-enviar {
      width: 100%;
      padding: 14px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-enviar:disabled { background: #a5d6a7; cursor: not-allowed; }

    #mensaje { margin-top: 14px; padding: 12px; border-radius: 6px; font-size: 0.9rem; text-align: center; display: none; }
    .ok    { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }

    /* Pantalla de bloqueo con PIN */
    #bloqueo {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #2e7d32; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 1000; padding: 24px;
    }
    #bloqueo h2 { color: white; font-size: 1.3rem; margin-bottom: 8px; text-align: center; }
    #bloqueo p  { color: #e8f5e9; font-size: 0.9rem; margin-bottom: 24px; text-align: center; }
    #pin-input {
      width: 100%; max-width: 280px; padding: 14px; font-size: 1.4rem;
      text-align: center; letter-spacing: 8px; border: none; border-radius: 8px; margin-bottom: 16px;
    }
    #btn-desbloquear {
      width: 100%; max-width: 280px; padding: 14px; background: #1b5e20;
      color: white; border: 2px solid white; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer;
    }
    #pin-error { color: #ffcdd2; font-size: 0.85rem; margin-top: 12px; height: 18px; text-align: center; }
  </style>
</head>
<body>

  <!-- Pantalla de bloqueo con PIN -->
  <div id="bloqueo">
    <h2>Registro de Despachos</h2>
    <p>RECUPAC — Ingresa el PIN para acceder</p>
    <input type="password" id="pin-input" inputmode="numeric" maxlength="4" placeholder="••••">
    <button id="btn-desbloquear" onclick="validarPin()">Acceder</button>
    <div id="pin-error"></div>
  </div>

  <header>
    <img id="logo" alt="" style="display:none">
    <div class="titulo">
      <h1>Registro de Despachos</h1>
      <p>RECUPAC — Selecciona las series a despachar</p>
    </div>
  </header>

  <div class="card">
    <label class="campo" for="fecha">Fecha de despacho</label>
    <input type="date" id="fecha">

    <label class="campo" for="responsable">Responsable</label>
    <select id="responsable">
      <option value="">-- Seleccionar --</option>
      <option>Ariel P.</option>
      <option>Willians T.</option>
      <option>Evens F.</option>
    </select>

    <label class="campo" for="cliente">Cliente / Destino</label>
    <input type="text" id="cliente" placeholder="Ingresa el cliente o destino">
  </div>

  <!-- Series seleccionadas (siempre visible) -->
  <div class="card">
    <div class="sel-header">
      <span class="titulo-sel">Series seleccionadas (<span id="num-sel">0</span>)</span>
      <button class="btn-limpiar" onclick="limpiarSeleccion()">Limpiar todo</button>
    </div>
    <div id="chips"><span class="chip-vacio">Aún no hay series seleccionadas.</span></div>
  </div>

  <!-- Stock -->
  <div class="card">
    <div class="stock-header">
      <label class="campo" style="margin:0">Series en stock</label>
      <button class="btn-seleccionar" onclick="seleccionarVisibles()">Seleccionar visibles</button>
    </div>

    <input type="text" id="buscador" placeholder="🔍 Buscar serie..." oninput="buscar(this.value)">

    <div id="filtro-pcr">
      <button class="btn-pcr activo" onclick="filtrar('TODOS')">Todos</button>
      <button class="btn-pcr" onclick="filtrar('PCR10')">PCR10</button>
      <button class="btn-pcr" onclick="filtrar('PCR15')">PCR15</button>
      <button class="btn-pcr" onclick="filtrar('PCR20')">PCR20</button>
      <button class="btn-pcr" onclick="filtrar('PCR30')">PCR30</button>
    </div>

    <button class="btn-escanear" onclick="iniciarEscaneo()">📷 Escanear código QR</button>
    <select id="cam-select" style="display:none;" onchange="cambiarCamara()"></select>
    <div id="reader-wrapper" style="position: relative;">
      <div id="reader"></div>
      <div id="scan-feedback"></div>
    </div>
    <button id="btn-cerrar-scanner" onclick="detenerEscaneo()">✕ Cerrar cámara</button>
    <div id="serie-escaneada"></div>

    <div id="contador">0 series seleccionadas</div>
    <div id="lista-series">
      <div class="loading">Cargando stock...</div>
    </div>
  </div>

  <button class="btn-enviar" id="btn-enviar" onclick="enviar()" disabled>
    Registrar Despacho
  </button>

  <div id="mensaje"></div>

<script>
  // ============================================================
  // CONFIGURACIÓN
  // ============================================================
  const API_URL = "https://script.google.com/macros/s/AKfycbzxHQCZrBP7ALkABqBvnH4Kb_38v_nd3f7SmrVfhuy214L8mBA4Mpxoiqf-FMsENvcdvQ/exec";
  const TOKEN   = "1234";
  const PIN     = "4070";

  // ============================================================
  // ESTADO
  // ============================================================
  let todoStock     = [];               // stock completo (todos los PCR)
  let seleccionadas = {};               // serie -> {serie, fila, descripcion}
  let filtroActivo  = "TODOS";
  let textoBusqueda = "";
  let html5Qr       = null;
  let ultimaLeida   = "";

  // ============================================================
  // BLOQUEO POR PIN
  // ============================================================
  function validarPin() {
    const valor = String(document.getElementById("pin-input").value).trim();
    if (valor === String(PIN).trim()) {
      document.getElementById("bloqueo").style.display = "none";
      iniciarApp();
    } else {
      document.getElementById("pin-error").textContent = "PIN incorrecto. Intenta nuevamente.";
      document.getElementById("pin-input").value = "";
    }
  }
  document.getElementById("pin-input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") validarPin();
  });

  function iniciarApp() {
    cargarLogo();
    cargarStock();
    setInterval(cargarStock, 600000); // refresco cada 10 min
  }

  // ============================================================
  // LOGO
  // ============================================================
  function cargarLogo() {
    fetch(API_URL + "?action=logo&token=" + encodeURIComponent(TOKEN))
      .then(r => r.json())
      .then(function(data) {
        if (data.logo) {
          const logo = document.getElementById("logo");
          logo.src = data.logo;
          logo.style.display = "block";
        }
      })
      .catch(function() {});
  }

  // ============================================================
  // STOCK (se carga completo y se filtra/busca en el cliente)
  // ============================================================
  function cargarStock() {
    fetch(API_URL + "?action=stock&pcr=TODOS&token=" + encodeURIComponent(TOKEN))
      .then(r => r.json())
      .then(function(data) {
        todoStock = data || [];
        // Quita de la selección las series que ya no están en stock (despachadas)
        const enStock = {};
        todoStock.forEach(function(it) { enStock[it.serie] = true; });
        Object.keys(seleccionadas).forEach(function(s) {
          if (!enStock[s]) delete seleccionadas[s];
        });
        render();
        renderChips();
        actualizarContador();
      })
      .catch(function(err) {
        document.getElementById("lista-series").innerHTML =
          '<div class="empty">Error al cargar el stock: ' + err.message + '</div>';
      });
  }

  // Lista visible según filtro PCR y búsqueda
  function visibles() {
    const t = textoBusqueda.trim().toUpperCase();
    return todoStock.filter(function(it) {
      const coincidePCR = filtroActivo === "TODOS" || it.descripcion === filtroActivo;
      const coincideTxt = t === "" || String(it.serie).toUpperCase().indexOf(t) !== -1;
      return coincidePCR && coincideTxt;
    });
  }

  function render() {
    const lista = document.getElementById("lista-series");
    const items = visibles();

    if (!items.length) {
      lista.innerHTML = '<div class="empty">No hay series que coincidan con el filtro o búsqueda.</div>';
      return;
    }

    lista.innerHTML = items.map(function(it) {
      const sel = seleccionadas[it.serie] ? "escaneada" : "";
      const chk = seleccionadas[it.serie] ? "checked" : "";
      return '<div class="serie-item ' + sel + '" id="item_' + it.serie + '" onclick="toggleSerie(\'' + it.serie + '\')">' +
               '<input type="checkbox" ' + chk + '>' +
               '<div class="serie-info">' +
                 '<div class="serie-codigo">' + it.serie + '</div>' +
                 '<div class="serie-desc">' + (it.descripcion || "Sin descripción") + '</div>' +
               '</div>' +
             '</div>';
    }).join("");
  }

  // Marca o desmarca una serie (persiste aunque cambie el filtro)
  function toggleSerie(serie) {
    if (seleccionadas[serie]) {
      delete seleccionadas[serie];
    } else {
      const it = todoStock.find(function(x) { return x.serie === serie; });
      if (it) seleccionadas[serie] = { serie: it.serie, fila: it.fila, descripcion: it.descripcion };
    }
    // Actualiza solo esa fila visible
    const item = document.getElementById("item_" + serie);
    if (item) {
      const cb = item.querySelector("input[type=checkbox]");
      if (seleccionadas[serie]) { cb.checked = true; item.classList.add("escaneada"); }
      else { cb.checked = false; item.classList.remove("escaneada"); }
    }
    renderChips();
    actualizarContador();
  }

  function filtrar(pcr) {
    filtroActivo = pcr;
    document.querySelectorAll(".btn-pcr").forEach(function(btn) {
      btn.classList.toggle("activo", btn.textContent === pcr || (pcr === "TODOS" && btn.textContent === "Todos"));
    });
    render();
  }

  function buscar(texto) {
    textoBusqueda = texto || "";
    render();
  }

  // Selecciona todas las series visibles actualmente
  function seleccionarVisibles() {
    visibles().forEach(function(it) {
      seleccionadas[it.serie] = { serie: it.serie, fila: it.fila, descripcion: it.descripcion };
    });
    render();
    renderChips();
    actualizarContador();
  }

  function limpiarSeleccion() {
    seleccionadas = {};
    render();
    renderChips();
    actualizarContador();
  }

  // Chips de series seleccionadas (siempre visibles)
  function renderChips() {
    const cont = document.getElementById("chips");
    const claves = Object.keys(seleccionadas);
    if (!claves.length) {
      cont.innerHTML = '<span class="chip-vacio">Aún no hay series seleccionadas.</span>';
      return;
    }
    cont.innerHTML = claves.map(function(s) {
      return '<span class="chip">' + s + ' <span class="x" onclick="quitarChip(\'' + s + '\')">✕</span></span>';
    }).join("");
  }

  function quitarChip(serie) {
    delete seleccionadas[serie];
    const item = document.getElementById("item_" + serie);
    if (item) {
      const cb = item.querySelector("input[type=checkbox]");
      cb.checked = false;
      item.classList.remove("escaneada");
    }
    renderChips();
    actualizarContador();
  }

  function actualizarContador() {
    const n = Object.keys(seleccionadas).length;
    document.getElementById("contador").textContent = n + " series seleccionadas";
    document.getElementById("num-sel").textContent = n;
    document.getElementById("btn-enviar").disabled = n === 0;
  }

  // ============================================================
  // ESCANEO EN VIVO con selector de cámara
  // ============================================================
  function iniciarEscaneo() {
    document.getElementById("reader").style.display = "block";
    document.getElementById("btn-cerrar-scanner").style.display = "block";
    ultimaLeida = "";

    Html5Qrcode.getCameras().then(function(camaras) {
      if (!camaras || !camaras.length) {
        mostrarInfoEscaneo("⚠️ No se detectaron cámaras.", "error");
        detenerEscaneo();
        return;
      }
      const traseras = camaras.filter(function(c) {
        const l = (c.label || "").toLowerCase();
        return l.indexOf("back") !== -1 || l.indexOf("rear") !== -1 ||
               l.indexOf("trasera") !== -1 || l.indexOf("environment") !== -1;
      });
      const lista = traseras.length ? traseras : camaras;

      const select = document.getElementById("cam-select");
      select.innerHTML = lista.map(function(c, i) {
        return '<option value="' + c.id + '">' + (c.label || ("Cámara " + (i + 1))) + '</option>';
      }).join("");
      select.style.display = lista.length > 1 ? "block" : "none";

      const guardada = localStorage.getItem("camaraDespachos");
      let camaraId = lista[0].id;
      if (guardada && lista.some(function(c) { return c.id === guardada; })) camaraId = guardada;
      select.value = camaraId;

      arrancarCamara(camaraId);
    }).catch(function(err) {
      mostrarInfoEscaneo("⚠️ No se pudo acceder a las cámaras: " + err, "error");
      detenerEscaneo();
    });
  }

  function arrancarCamara(camaraId) {
    html5Qr = new Html5Qrcode("reader");
    html5Qr.start(
      camaraId,
      { fps: 10, qrbox: { width: 250, height: 250 } },
      function(textoLeido) {
        const serie = textoLeido.trim();
        if (serie === ultimaLeida) return;
        ultimaLeida = serie;
        procesarSerieEscaneada(serie);
      },
      function() {}
    ).catch(function(err) {
      mostrarInfoEscaneo("⚠️ No se pudo iniciar la cámara: " + err, "error");
      detenerEscaneo();
    });
  }

  function cambiarCamara() {
    const camaraId = document.getElementById("cam-select").value;
    localStorage.setItem("camaraDespachos", camaraId);
    if (html5Qr) {
      html5Qr.stop().then(function() {
        html5Qr.clear(); html5Qr = null; arrancarCamara(camaraId);
      }).catch(function() { html5Qr = null; arrancarCamara(camaraId); });
    } else {
      arrancarCamara(camaraId);
    }
  }

  function detenerEscaneo() {
    if (html5Qr) {
      html5Qr.stop().then(function() { html5Qr.clear(); html5Qr = null; })
        .catch(function() { html5Qr = null; });
    }
    document.getElementById("reader").style.display = "none";
    document.getElementById("btn-cerrar-scanner").style.display = "none";
    document.getElementById("cam-select").style.display = "none";
  }

  function procesarSerieEscaneada(serie) {
    const it = todoStock.find(function(x) { return x.serie === serie; });
    if (!it) {
      reproducirBeep(false);
      mostrarFeedbackCamara("✕ " + serie + " no está en stock", false);
      mostrarInfoEscaneo("⚠️ Serie " + serie + " no está en el stock actual.", "error");
      setTimeout(function() { ultimaLeida = ""; }, 1500);
      return;
    }
    seleccionadas[serie] = { serie: it.serie, fila: it.fila, descripcion: it.descripcion };
    render();
    renderChips();
    actualizarContador();
    reproducirBeep(true);
    mostrarFeedbackCamara("✓ " + serie, true);
    mostrarInfoEscaneo("✅ Serie " + serie + " seleccionada. Puedes escanear la siguiente.", "ok");
    setTimeout(function() { ultimaLeida = ""; }, 1500);
  }

  function reproducirBeep(exito) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = exito ? 880 : 220;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc.start(); osc.stop(ctx.currentTime + 0.2);
    } catch (e) {}
  }

  function mostrarFeedbackCamara(texto, exito) {
    const fb = document.getElementById("scan-feedback");
    fb.textContent = texto;
    fb.style.background = exito ? "rgba(46, 125, 50, 0.92)" : "rgba(198, 40, 40, 0.92)";
    fb.style.display = "block";
    setTimeout(function() { fb.style.display = "none"; }, 1200);
  }

  function mostrarInfoEscaneo(texto, tipo) {
    const el = document.getElementById("serie-escaneada");
    el.textContent = texto;
    el.style.display = "block";
    if (tipo === "ok") { el.style.background = "#e8f5e9"; el.style.color = "#2e7d32"; el.style.border = "1px solid #a5d6a7"; }
    else { el.style.background = "#ffebee"; el.style.color = "#c62828"; el.style.border = "1px solid #ef9a9a"; }
  }

  // ============================================================
  // ENVÍO
  // ============================================================
  function enviar() {
    const fecha       = document.getElementById("fecha").value;
    const responsable = document.getElementById("responsable").value;
    const cliente     = document.getElementById("cliente").value.trim();

    if (!fecha || !responsable || !cliente) {
      mostrarMensaje("Completa todos los campos antes de registrar.", "error");
      return;
    }

    const series = Object.keys(seleccionadas).map(function(s) {
      const x = seleccionadas[s];
      return { serie: x.serie, fila: x.fila, descripcion: x.descripcion };
    });

    if (!series.length) {
      mostrarMensaje("Selecciona al menos una serie.", "error");
      return;
    }

    document.getElementById("btn-enviar").disabled = true;
    document.getElementById("btn-enviar").textContent = "Registrando...";

    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ series: series, fecha: fecha, responsable: responsable, cliente: cliente, token: TOKEN })
    })
      .then(r => r.json())
      .then(function(res) {
        if (res.ok) {
          mostrarMensaje("✅ " + res.cantidad + " series registradas correctamente.", "ok");
          seleccionadas = {};
        } else {
          mostrarMensaje("Error: " + res.error, "error");
        }
        document.getElementById("btn-enviar").textContent = "Registrar Despacho";
        cargarStock();
      })
      .catch(function(err) {
        mostrarMensaje("Error al registrar: " + err.message, "error");
        document.getElementById("btn-enviar").disabled = false;
        document.getElementById("btn-enviar").textContent = "Registrar Despacho";
      });
  }

  function mostrarMensaje(texto, tipo) {
    const el = document.getElementById("mensaje");
    el.textContent = texto;
    el.className = tipo;
    el.style.display = "block";
    setTimeout(function() { el.style.display = "none"; }, 5000);
  }
</script>

</body>
</html>
