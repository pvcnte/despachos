<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Despachos</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f0;
      color: #1a1a1a;
      padding: 16px;
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header .titulo { flex: 1; text-align: center; }
    header h1 { font-size: 1.2rem; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
    header img { height: 46px; width: auto; flex-shrink: 0; }

    .card {
      background: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    label.campo {
      display: block;
      font-size: 0.85rem;
      font-weight: bold;
      color: #2e7d32;
      margin-bottom: 6px;
    }

    input[type="date"], input[type="text"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #c8e6c9;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 14px;
    }

    .stock-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .btn-seleccionar {
      font-size: 0.78rem;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
    }

    #filtro-pcr {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .btn-pcr {
      padding: 6px 14px;
      border: 1px solid #a5d6a7;
      border-radius: 20px;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .btn-pcr.activo {
      background: #2e7d32;
      color: white;
      border-color: #2e7d32;
    }

    /* --- Escaneo en vivo --- */
    .btn-escanear {
      display: block;
      width: 100%;
      padding: 12px;
      background: #1b5e20;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
      text-align: center;
    }

    #reader {
      display: none;
      width: 100%;
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
    }

    .fila-scanner-botones { display: flex; gap: 8px; }

    #btn-cerrar-scanner {
      display: none;
      flex: 1;
      padding: 8px;
      background: #c62828;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-bottom: 12px;
    }

    #btn-linterna {
      display: none;
      flex: 1;
      padding: 8px;
      background: #455a64;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-bottom: 12px;
    }

    #serie-escaneada {
      display: none;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 12px;
      text-align: center;
    }

    #contador {
      font-size: 0.85rem;
      color: #2e7d32;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .serie-item {
      display: flex;
      align-items: center;
      padding: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .serie-item.escaneada {
      border-color: #2e7d32;
      background: #f1f8f1;
    }

    .serie-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 0 12px 0 0;
      accent-color: #2e7d32;
      flex-shrink: 0;
    }

    .serie-info { flex: 1; }
    .serie-codigo { font-weight: bold; font-size: 0.95rem; }
    .serie-desc   { font-size: 0.8rem; color: #666; margin-top: 2px; }

    .empty   { text-align: center; color: #999; font-size: 0.9rem; padding: 20px 0; }
    .loading { text-align: center; color: #999; padding: 20px 0; font-size: 0.9rem; }

    .btn-enviar {
      width: 100%;
      padding: 14px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-enviar:disabled { background: #a5d6a7; cursor: not-allowed; }

    #mensaje {
      margin-top: 14px;
      padding: 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    .ok    { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
  </style>
</head>
<body>

  <header>
    <img id="logo" alt="" style="display:none">
    <div class="titulo">
      <h1>Registro de Despachos</h1>
      <p>RECUPAC — Selecciona las series a despachar</p>
    </div>
  </header>

  <div class="card">
    <label class="campo" for="fecha">Fecha de despacho</label>
    <input type="date" id="fecha">

    <label class="campo" for="responsable">Responsable</label>
    <select id="responsable">
      <option value="">-- Seleccionar --</option>
      <option>Ariel P.</option>
      <option>Willians T.</option>
      <option>Evens F.</option>
    </select>

    <label class="campo" for="cliente">Cliente / Destino</label>
    <input type="text" id="cliente" placeholder="Ingresa el cliente o destino">
  </div>

  <div class="card">
    <div class="stock-header">
      <label class="campo" style="margin:0">Series en stock</label>
      <button class="btn-seleccionar" onclick="toggleSeleccion()">Seleccionar todo</button>
    </div>

    <div id="filtro-pcr">
      <button class="btn-pcr activo" onclick="filtrar('TODOS')">Todos</button>
      <button class="btn-pcr" onclick="filtrar('PCR10')">PCR10</button>
      <button class="btn-pcr" onclick="filtrar('PCR15')">PCR15</button>
      <button class="btn-pcr" onclick="filtrar('PCR20')">PCR20</button>
      <button class="btn-pcr" onclick="filtrar('PCR30')">PCR30</button>
    </div>

    <!-- Escaneo en vivo -->
    <button class="btn-escanear" onclick="iniciarEscaneo()">📷 Escanear código QR</button>
    <div id="reader"></div>
    <div class="fila-scanner-botones">
      <button id="btn-cerrar-scanner" onclick="detenerEscaneo()">✕ Cerrar cámara</button>
      <button id="btn-linterna" onclick="toggleLinterna()">🔦 Linterna</button>
    </div>
    <div id="serie-escaneada"></div>

    <div id="contador">0 series seleccionadas</div>
    <div id="lista-series">
      <div class="loading">Cargando stock...</div>
    </div>
  </div>

  <button class="btn-enviar" id="btn-enviar" onclick="enviar()" disabled>
    Registrar Despacho
  </button>

  <div id="mensaje"></div>

<script>
  // ⚠️ URL /exec de la Web App de Apps Script
  const API_URL = "https://script.google.com/macros/s/AKfycbyxu1lXFdoOqdCc0ihNg8vXFYJbsord661qx2b_gVdZz-HHvKgdmkXGED5MfFJMqNNczA/exec";

  // Formato de serie de saca: 6 dígitos + letra + número (ej. 260611A1).
  // La etiqueta tiene 2 QR: este patrón descarta el QR chico de Ficha Técnica (URL).
  const RE_SERIE = /^\d{6}[A-Z]\d{1,3}$/;

  // El stock COMPLETO se carga una sola vez (TODOS); el filtro PCR es solo visual.
  // Así el escáner siempre encuentra la serie aunque el filtro esté en otro PCR,
  // y las selecciones no se pierden al cambiar de filtro.
  let stockData     = [];            // stock completo [{serie, descripcion, fila}]
  let seleccionadas = new Set();     // series marcadas (sobrevive a filtros)
  let filtroActivo  = "TODOS";
  let html5Qr       = null;
  let escaneoEnPausa = false;
  let linternaOn    = false;

  window.onload = () => {
    // Fecha de hoy por defecto
    document.getElementById("fecha").value = new Date().toISOString().slice(0, 10);
    cargarLogo();
    cargarStock();
  };

  // ============================================================
  // LOGO
  // ============================================================
  function cargarLogo() {
    fetch(API_URL + "?action=logo")
      .then(r => r.json())
      .then(data => {
        if (data.logo) {
          const logo = document.getElementById("logo");
          logo.src = data.logo;
          logo.style.display = "block";
        }
      })
      .catch(() => {});
  }

  // ============================================================
  // ESCANEO EN VIVO con html5-qrcode
  // ============================================================
  function iniciarEscaneo() {
    document.getElementById("reader").style.display = "block";
    document.getElementById("btn-cerrar-scanner").style.display = "block";
    escaneoEnPausa = false;

    // Solo formato QR (por defecto intenta 17 formatos por cuadro = lento)
    html5Qr = new Html5Qrcode("reader", {
      formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
      useBarCodeDetectorIfSupported: true
    });

    html5Qr.start(
      { facingMode: "environment" },
      {
        fps: 10,
        disableFlip: true,  // no reintentar el cuadro espejado (QR impresos)
        // Recuadro de puntería proporcional a la pantalla
        qrbox: (w, h) => {
          const lado = Math.floor(Math.min(w, h) * 0.7);
          return { width: lado, height: lado };
        },
        // Resolución alta: sin esto la cámara abre en ~640px y no decodifica a distancia
        videoConstraints: {
          facingMode: "environment",
          width:  { ideal: 1920 },
          height: { ideal: 1080 }
        }
      },
      (textoLeido) => {
        if (escaneoEnPausa) return;
        const serie = String(textoLeido).trim().toUpperCase();
        // Descarta el QR de Ficha Técnica (URL) y cualquier lectura basura
        if (!RE_SERIE.test(serie)) return;
        // Pausa breve anti doble-lectura de la misma saca
        escaneoEnPausa = true;
        setTimeout(() => { escaneoEnPausa = false; }, 1200);
        procesarSerieEscaneada(serie);
      },
      () => {} // ignora errores de cada frame sin lectura
    ).then(() => {
      mostrarBotonLinternaSiSoportado();
    }).catch(err => {
      mostrarInfoEscaneo("⚠️ No se pudo iniciar la cámara: " + err, "error");
      detenerEscaneo();
    });
  }

  function detenerEscaneo() {
    if (html5Qr) {
      html5Qr.stop().then(() => {
        html5Qr.clear();
        html5Qr = null;
      }).catch(() => { html5Qr = null; });
    }
    linternaOn = false;
    document.getElementById("reader").style.display = "none";
    document.getElementById("btn-cerrar-scanner").style.display = "none";
    document.getElementById("btn-linterna").style.display = "none";
  }

  // Linterna para la bodega (si el teléfono la soporta)
  function mostrarBotonLinternaSiSoportado() {
    try {
      const caps = html5Qr.getRunningTrackCameraCapabilities();
      if (caps.torchFeature().isSupported()) {
        document.getElementById("btn-linterna").style.display = "block";
      }
    } catch (e) { /* sin soporte: no mostrar */ }
  }

  function toggleLinterna() {
    if (!html5Qr) return;
    try {
      const torch = html5Qr.getRunningTrackCameraCapabilities().torchFeature();
      linternaOn = !linternaOn;
      torch.apply(linternaOn);
      document.getElementById("btn-linterna").textContent = linternaOn ? "🔦 Apagar linterna" : "🔦 Linterna";
    } catch (e) { /* ignorar */ }
  }

  function procesarSerieEscaneada(serie) {
    // Busca en el stock COMPLETO (el filtro PCR ya no esconde series al escáner)
    const item = stockData.find(x => String(x.serie).trim().toUpperCase() === serie);
    if (!item) {
      mostrarInfoEscaneo("⚠️ Serie " + serie + " no está en el stock (ya despachada o aún no subida a la planilla).", "error");
      return;
    }
    if (seleccionadas.has(item.serie)) {
      mostrarInfoEscaneo("ℹ️ Serie " + serie + " ya estaba seleccionada.", "ok");
      return;
    }
    seleccionadas.add(item.serie);
    if (navigator.vibrate) navigator.vibrate(80);

    // Si el filtro actual esconde esta serie, pasar a TODOS para que se vea
    if (filtroActivo !== "TODOS" && item.descripcion !== filtroActivo) {
      filtrar("TODOS");
    } else {
      renderStock();
    }
    const fila = document.querySelector('[data-serie="' + item.serie + '"]');
    if (fila) fila.scrollIntoView({ behavior: "smooth", block: "center" });
    mostrarInfoEscaneo("✅ Serie " + serie + " (" + (item.descripcion || "") + ") seleccionada. Puedes escanear la siguiente.", "ok");
  }

  function mostrarInfoEscaneo(texto, tipo) {
    const el = document.getElementById("serie-escaneada");
    el.textContent   = texto;
    el.style.display = "block";
    if (tipo === "ok") {
      el.style.background = "#e8f5e9"; el.style.color = "#2e7d32"; el.style.border = "1px solid #a5d6a7";
    } else {
      el.style.background = "#ffebee"; el.style.color = "#c62828"; el.style.border = "1px solid #ef9a9a";
    }
  }

  // ============================================================
  // STOCK (se trae completo una vez; el filtro PCR es local)
  // ============================================================
  function cargarStock() {
    document.getElementById("lista-series").innerHTML = '<div class="loading">Cargando stock...</div>';
    fetch(API_URL + "?action=stock&pcr=TODOS")
      .then(r => r.json())
      .then(data => {
        stockData = data || [];
        // Limpia selecciones de series que ya no están en stock
        const vigentes = new Set(stockData.map(x => x.serie));
        seleccionadas.forEach(s => { if (!vigentes.has(s)) seleccionadas.delete(s); });
        renderStock();
      })
      .catch(err => {
        document.getElementById("lista-series").innerHTML =
          '<div class="empty">Error al cargar el stock: ' + err.message + '</div>';
      });
  }

  function renderStock() {
    const lista = document.getElementById("lista-series");
    const visibles = filtroActivo === "TODOS"
      ? stockData
      : stockData.filter(x => x.descripcion === filtroActivo);

    if (!visibles.length) {
      lista.innerHTML = '<div class="empty">No hay series en stock para este tipo de PCR.</div>';
      actualizarContador();
      return;
    }

    lista.innerHTML = visibles.map(item => {
      const sel = seleccionadas.has(item.serie);
      return `
      <div class="serie-item ${sel ? "escaneada" : ""}" data-serie="${item.serie}" onclick="toggleSerie('${item.serie}')">
        <input type="checkbox" ${sel ? "checked" : ""} onclick="event.stopPropagation(); toggleSerie('${item.serie}')">
        <div class="serie-info">
          <div class="serie-codigo">${item.serie}</div>
          <div class="serie-desc">${item.descripcion || "Sin descripción"}</div>
        </div>
      </div>`;
    }).join("");

    actualizarContador();
  }

  function filtrar(pcr) {
    filtroActivo = pcr;
    document.querySelectorAll(".btn-pcr").forEach(btn => {
      btn.classList.toggle("activo", btn.textContent === pcr || (pcr === "TODOS" && btn.textContent === "Todos"));
    });
    renderStock();  // local: no se pierden selecciones ni se vuelve a llamar al servidor
  }

  function toggleSerie(serie) {
    if (seleccionadas.has(serie)) seleccionadas.delete(serie);
    else seleccionadas.add(serie);
    renderStock();
  }

  function toggleSeleccion() {
    // Aplica solo a las series visibles según el filtro actual
    const visibles = filtroActivo === "TODOS"
      ? stockData
      : stockData.filter(x => x.descripcion === filtroActivo);
    const todasMarcadas = visibles.length > 0 && visibles.every(x => seleccionadas.has(x.serie));
    visibles.forEach(x => {
      if (todasMarcadas) seleccionadas.delete(x.serie);
      else seleccionadas.add(x.serie);
    });
    renderStock();
  }

  function actualizarContador() {
    const n = seleccionadas.size;
    document.getElementById("contador").textContent = n + " series seleccionadas";
    document.getElementById("btn-enviar").disabled = n === 0;
  }

  // ============================================================
  // ENVÍO
  // ============================================================
  function enviar() {
    const fecha       = document.getElementById("fecha").value;
    const responsable = document.getElementById("responsable").value;
    const cliente     = document.getElementById("cliente").value.trim();

    if (!fecha || !responsable || !cliente) {
      mostrarMensaje("Completa todos los campos antes de registrar.", "error");
      return;
    }

    if (seleccionadas.size === 0) {
      mostrarMensaje("Selecciona al menos una serie.", "error");
      return;
    }

    // Solo se envía la serie: el backend ubica la fila por serie al momento
    // de escribir (la fila puede haberse movido si alguien ordenó la planilla)
    const series = Array.from(seleccionadas).map(serie => ({ serie }));

    document.getElementById("btn-enviar").disabled = true;
    document.getElementById("btn-enviar").textContent = "Registrando...";

    // Cuerpo como texto plano para evitar el preflight CORS
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ series, fecha, responsable, cliente })
    })
      .then(r => r.json())
      .then(res => {
        if (res.ok) {
          let msg = "✅ " + res.cantidad + " series registradas correctamente.";
          // Backend v2: detalle por serie (rechazadas con motivo)
          if (res.detalle) {
            const rechazadas = res.detalle.filter(d => !d.ok);
            if (rechazadas.length) {
              msg += " ⚠️ Rechazadas: " + rechazadas.map(d => d.serie + " (" + d.motivo + ")").join(", ");
            }
          }
          mostrarMensaje(msg, "ok");
          seleccionadas.clear();
        } else {
          mostrarMensaje("Error: " + (res.error || "desconocido"), "error");
        }
        document.getElementById("btn-enviar").textContent = "Registrar Despacho";
        cargarStock();
      })
      .catch(err => {
        mostrarMensaje("Error al registrar: " + err.message, "error");
        document.getElementById("btn-enviar").disabled = false;
        document.getElementById("btn-enviar").textContent = "Registrar Despacho";
      });
  }

  function mostrarMensaje(texto, tipo) {
    const el = document.getElementById("mensaje");
    el.textContent   = texto;
    el.className     = tipo;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 5000);
  }
</script>

</body>
</html>
