<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Despachos</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f0;
      color: #1a1a1a;
      padding: 16px;
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header .titulo { flex: 1; text-align: center; }
    header h1 { font-size: 1.2rem; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
    header img { height: 46px; width: auto; flex-shrink: 0; }

    .card {
      background: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    label.campo {
      display: block;
      font-size: 0.85rem;
      font-weight: bold;
      color: #2e7d32;
      margin-bottom: 6px;
    }

    input[type="date"], input[type="text"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #c8e6c9;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 14px;
    }

    .stock-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .btn-seleccionar {
      font-size: 0.78rem;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
    }

    #filtro-pcr {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .btn-pcr {
      padding: 6px 14px;
      border: 1px solid #a5d6a7;
      border-radius: 20px;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .btn-pcr.activo {
      background: #2e7d32;
      color: white;
      border-color: #2e7d32;
    }

    .btn-escanear {
      display: block;
      width: 100%;
      padding: 12px;
      background: #1b5e20;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
      text-align: center;
    }

    #reader {
      display: none;
      width: 100%;
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
    }

    /* Mensaje superpuesto sobre la cámara al escanear */
    #scan-feedback {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(46, 125, 50, 0.92);
      color: white;
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      text-align: center;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      pointer-events: none;
    }

    #btn-cerrar-scanner {
      display: none;
      width: 100%;
      padding: 8px;
      background: #c62828;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-bottom: 12px;
    }

    #serie-escaneada {
      display: none;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 12px;
      text-align: center;
    }

    #contador {
      font-size: 0.85rem;
      color: #2e7d32;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .serie-item {
      display: flex;
      align-items: center;
      padding: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .serie-item.escaneada {
      border-color: #2e7d32;
      background: #f1f8f1;
    }

    .serie-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 0 12px 0 0;
      accent-color: #2e7d32;
      flex-shrink: 0;
    }

    .serie-info { flex: 1; }
    .serie-codigo { font-weight: bold; font-size: 0.95rem; }
    .serie-desc   { font-size: 0.8rem; color: #666; margin-top: 2px; }

    .empty   { text-align: center; color: #999; font-size: 0.9rem; padding: 20px 0; }
    .loading { text-align: center; color: #999; padding: 20px 0; font-size: 0.9rem; }

    .btn-enviar {
      width: 100%;
      padding: 14px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-enviar:disabled { background: #a5d6a7; cursor: not-allowed; }

    #mensaje {
      margin-top: 14px;
      padding: 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    .ok    { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }

    /* --- Pantalla de bloqueo con PIN --- */
    #bloqueo {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #2e7d32;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
    }

    #bloqueo h2 { color: white; font-size: 1.3rem; margin-bottom: 8px; text-align: center; }
    #bloqueo p  { color: #e8f5e9; font-size: 0.9rem; margin-bottom: 24px; text-align: center; }

    #pin-input {
      width: 100%;
      max-width: 280px;
      padding: 14px;
      font-size: 1.4rem;
      text-align: center;
      letter-spacing: 8px;
      border: none;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    #btn-desbloquear {
      width: 100%;
      max-width: 280px;
      padding: 14px;
      background: #1b5e20;
      color: white;
      border: 2px solid white;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    #pin-error {
      color: #ffcdd2;
      font-size: 0.85rem;
      margin-top: 12px;
      height: 18px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Pantalla de bloqueo con PIN -->
  <div id="bloqueo">
    <h2>Registro de Despachos</h2>
    <p>RECUPAC — Ingresa el PIN para acceder</p>
    <input type="password" id="pin-input" inputmode="numeric" maxlength="4" placeholder="••••">
    <button id="btn-desbloquear" onclick="validarPin()">Acceder</button>
    <div id="pin-error"></div>
  </div>

  <header>
    <img id="logo" alt="" style="display:none">
    <div class="titulo">
      <h1>Registro de Despachos</h1>
      <p>RECUPAC — Selecciona las series a despachar</p>
    </div>
  </header>

  <div class="card">
    <label class="campo" for="fecha">Fecha de despacho</label>
    <input type="date" id="fecha">

    <label class="campo" for="responsable">Responsable</label>
    <select id="responsable">
      <option value="">-- Seleccionar --</option>
      <option>Ariel P.</option>
      <option>Willians T.</option>
      <option>Evens F.</option>
    </select>

    <label class="campo" for="cliente">Cliente / Destino</label>
    <input type="text" id="cliente" placeholder="Ingresa el cliente o destino">
  </div>

  <div class="card">
    <div class="stock-header">
      <label class="campo" style="margin:0">Series en stock</label>
      <button class="btn-seleccionar" onclick="toggleSeleccion()">Seleccionar todo</button>
    </div>

    <div id="filtro-pcr">
      <button class="btn-pcr activo" onclick="filtrar('TODOS')">Todos</button>
      <button class="btn-pcr" onclick="filtrar('PCR10')">PCR10</button>
      <button class="btn-pcr" onclick="filtrar('PCR15')">PCR15</button>
      <button class="btn-pcr" onclick="filtrar('PCR20')">PCR20</button>
      <button class="btn-pcr" onclick="filtrar('PCR30')">PCR30</button>
    </div>

    <button class="btn-escanear" onclick="iniciarEscaneo()">📷 Escanear código QR</button>
    <div id="reader-wrapper" style="position: relative;">
      <div id="reader"></div>
      <div id="scan-feedback"></div>
    </div>
    <button id="btn-cerrar-scanner" onclick="detenerEscaneo()">✕ Cerrar cámara</button>
    <div id="serie-escaneada"></div>

    <div id="contador">0 series seleccionadas</div>
    <div id="lista-series">
      <div class="loading">Cargando stock...</div>
    </div>
  </div>

  <button class="btn-enviar" id="btn-enviar" onclick="enviar()" disabled>
    Registrar Despacho
  </button>

  <div id="mensaje"></div>

<script>
  // ============================================================
  // CONFIGURACIÓN — ajusta estos tres valores
  // ============================================================
  const API_URL = "https://script.google.com/macros/s/AKfycbxfAUFyrLQDMETSIhiPwoEL3-1XKa_4R6YRPilbCqR0sSnl-gJn3DID2vxtTNvY0jsq2w/exec";
  const TOKEN   = "1234";   // debe coincidir con el TOKEN del backend
  const PIN     = "4070";   // PIN de acceso a la página

  // ============================================================
  // VARIABLES DE ESTADO
  // ============================================================
  let stockData        = [];
  let todoSeleccionado = false;
  let filtroActivo     = "TODOS";
  let html5Qr          = null;
  let ultimaLeida      = "";

  // ============================================================
  // BLOQUEO POR PIN
  // ============================================================
  function validarPin() {
    const valor = String(document.getElementById("pin-input").value).trim();
    if (valor === String(PIN).trim()) {
      document.getElementById("bloqueo").style.display = "none";
      iniciarApp();
    } else {
      document.getElementById("pin-error").textContent = "PIN incorrecto. Intenta nuevamente.";
      document.getElementById("pin-input").value = "";
    }
  }

  // Permite validar con la tecla Enter (el script corre al final del body)
  document.getElementById("pin-input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") validarPin();
  });

  // Arranca la app una vez desbloqueada
  function iniciarApp() {
    cargarLogo();
    cargarStock();
    // Recarga automática del stock cada 10 minutos.
    // Preserva las series ya seleccionadas en pantalla.
    setInterval(cargarStock, 600000);
  }

  // ============================================================
  // LOGO
  // ============================================================
  function cargarLogo() {
    fetch(API_URL + "?action=logo&token=" + encodeURIComponent(TOKEN))
      .then(r => r.json())
      .then(data => {
        if (data.logo) {
          const logo = document.getElementById("logo");
          logo.src = data.logo;
          logo.style.display = "block";
        }
      })
      .catch(() => {});
  }

  // ============================================================
  // ESCANEO EN VIVO con html5-qrcode
  // ============================================================
  function iniciarEscaneo() {
    document.getElementById("reader").style.display = "block";
    document.getElementById("btn-cerrar-scanner").style.display = "block";
    ultimaLeida = "";

    html5Qr = new Html5Qrcode("reader");
    html5Qr.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      function(textoLeido) {
        const serie = textoLeido.trim();
        if (serie === ultimaLeida) return;
        ultimaLeida = serie;
        procesarSerieEscaneada(serie);
      },
      function() {}
    ).catch(function(err) {
      mostrarInfoEscaneo("⚠️ No se pudo iniciar la cámara: " + err, "error");
      detenerEscaneo();
    });
  }

  function detenerEscaneo() {
    if (html5Qr) {
      html5Qr.stop().then(function() {
        html5Qr.clear();
        html5Qr = null;
      }).catch(function() { html5Qr = null; });
    }
    document.getElementById("reader").style.display = "none";
    document.getElementById("btn-cerrar-scanner").style.display = "none";
  }

  // Reproduce un beep generado por código (sin archivos externos)
  function reproducirBeep(exito) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      // Tono agudo para éxito, grave para error
      osc.frequency.value = exito ? 880 : 220;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc.start();
      osc.stop(ctx.currentTime + 0.2);
    } catch (e) { /* si el navegador bloquea el audio, se ignora */ }
  }

  // Muestra un mensaje superpuesto sobre la cámara
  function mostrarFeedbackCamara(texto, exito) {
    const fb = document.getElementById("scan-feedback");
    fb.textContent = texto;
    fb.style.background = exito ? "rgba(46, 125, 50, 0.92)" : "rgba(198, 40, 40, 0.92)";
    fb.style.display = "block";
    setTimeout(function() { fb.style.display = "none"; }, 1200);
  }

  function procesarSerieEscaneada(serie) {
    const idx = stockData.findIndex(item => item.serie === serie);
    if (idx === -1) {
      reproducirBeep(false);
      mostrarFeedbackCamara("✕ " + serie + " no está en stock", false);
      mostrarInfoEscaneo("⚠️ Serie " + serie + " no está en el stock actual (o filtro PCR distinto).", "error");
      setTimeout(function() { ultimaLeida = ""; }, 1500);
      return;
    }
    document.getElementById("cb" + idx).checked = true;
    document.getElementById("item" + idx).classList.add("escaneada");
    actualizarContador();
    document.getElementById("item" + idx).scrollIntoView({ behavior: "smooth", block: "center" });
    reproducirBeep(true);
    mostrarFeedbackCamara("✓ " + serie, true);
    mostrarInfoEscaneo("✅ Serie " + serie + " seleccionada. Puedes escanear la siguiente.", "ok");
    setTimeout(function() { ultimaLeida = ""; }, 1500);
  }

  function mostrarInfoEscaneo(texto, tipo) {
    const el = document.getElementById("serie-escaneada");
    el.textContent   = texto;
    el.style.display = "block";
    if (tipo === "ok") {
      el.style.background = "#e8f5e9"; el.style.color = "#2e7d32"; el.style.border = "1px solid #a5d6a7";
    } else {
      el.style.background = "#ffebee"; el.style.color = "#c62828"; el.style.border = "1px solid #ef9a9a";
    }
  }

  // ============================================================
  // STOCK
  // ============================================================
  function cargarStock() {
    document.getElementById("lista-series").innerHTML = '<div class="loading">Cargando stock...</div>';
    fetch(API_URL + "?action=stock&pcr=" + encodeURIComponent(filtroActivo) + "&token=" + encodeURIComponent(TOKEN))
      .then(r => r.json())
      .then(renderStock)
      .catch(function(err) {
        document.getElementById("lista-series").innerHTML =
          '<div class="empty">Error al cargar el stock: ' + err.message + '</div>';
      });
  }

  function renderStock(data) {
    // Guarda las series actualmente seleccionadas antes de redibujar
    const seleccionPrevia = stockData
      .filter(function(_, i) {
        const cb = document.getElementById("cb" + i);
        return cb && cb.checked;
      })
      .map(function(item) { return item.serie; });

    stockData = data;
    const lista = document.getElementById("lista-series");

    if (!data || data.length === 0) {
      lista.innerHTML = '<div class="empty">No hay series en stock para este tipo de PCR.</div>';
      actualizarContador();
      return;
    }

    lista.innerHTML = data.map(function(item, i) {
      return '<div class="serie-item" id="item' + i + '" onclick="toggleCheck(' + i + ')">' +
               '<input type="checkbox" id="cb' + i + '" onchange="actualizarContador()">' +
               '<div class="serie-info">' +
                 '<div class="serie-codigo">' + item.serie + '</div>' +
                 '<div class="serie-desc">' + (item.descripcion || "Sin descripción") + '</div>' +
               '</div>' +
             '</div>';
    }).join("");

    // Restaura la selección previa que siga existiendo en el stock
    data.forEach(function(item, i) {
      if (seleccionPrevia.indexOf(item.serie) !== -1) {
        document.getElementById("cb" + i).checked = true;
        document.getElementById("item" + i).classList.add("escaneada");
      }
    });

    actualizarContador();
  }

  function filtrar(pcr) {
    filtroActivo     = pcr;
    todoSeleccionado = false;
    document.querySelectorAll(".btn-pcr").forEach(function(btn) {
      btn.classList.toggle("activo", btn.textContent === pcr || (pcr === "TODOS" && btn.textContent === "Todos"));
    });
    cargarStock();
  }

  function toggleCheck(i) {
    const cb = document.getElementById("cb" + i);
    cb.checked = !cb.checked;
    actualizarContador();
  }

  function toggleSeleccion() {
    todoSeleccionado = !todoSeleccionado;
    stockData.forEach(function(_, i) {
      document.getElementById("cb" + i).checked = todoSeleccionado;
    });
    actualizarContador();
  }

  function actualizarContador() {
    const n = stockData.filter(function(_, i) {
      const cb = document.getElementById("cb" + i);
      return cb && cb.checked;
    }).length;
    document.getElementById("contador").textContent = n + " series seleccionadas";
    document.getElementById("btn-enviar").disabled = n === 0;
  }

  // ============================================================
  // ENVÍO
  // ============================================================
  function enviar() {
    const fecha       = document.getElementById("fecha").value;
    const responsable = document.getElementById("responsable").value;
    const cliente     = document.getElementById("cliente").value.trim();

    if (!fecha || !responsable || !cliente) {
      mostrarMensaje("Completa todos los campos antes de registrar.", "error");
      return;
    }

    const seleccionadas = stockData.filter(function(_, i) {
      const cb = document.getElementById("cb" + i);
      return cb && cb.checked;
    }).map(function(item) {
      return { serie: item.serie, fila: item.fila };
    });

    if (seleccionadas.length === 0) {
      mostrarMensaje("Selecciona al menos una serie.", "error");
      return;
    }

    document.getElementById("btn-enviar").disabled = true;
    document.getElementById("btn-enviar").textContent = "Registrando...";

    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        series: seleccionadas,
        fecha: fecha,
        responsable: responsable,
        cliente: cliente,
        token: TOKEN
      })
    })
      .then(r => r.json())
      .then(function(res) {
        if (res.ok) {
          mostrarMensaje("✅ " + res.cantidad + " series registradas correctamente.", "ok");
        } else {
          mostrarMensaje("Error: " + res.error, "error");
        }
        document.getElementById("btn-enviar").textContent = "Registrar Despacho";
        cargarStock();
      })
      .catch(function(err) {
        mostrarMensaje("Error al registrar: " + err.message, "error");
        document.getElementById("btn-enviar").disabled = false;
        document.getElementById("btn-enviar").textContent = "Registrar Despacho";
      });
  }

  function mostrarMensaje(texto, tipo) {
    const el = document.getElementById("mensaje");
    el.textContent   = texto;
    el.className     = tipo;
    el.style.display = "block";
    setTimeout(function() { el.style.display = "none"; }, 5000);
  }
</script>

</body>
</html>
